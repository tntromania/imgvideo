<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>În Lucru | Viralio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                        'blob': 'blob 10s infinite alternate',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; background-color: #030712; }
        
        .glass-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .code-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .glowing-border {
            position: relative;
        }
        .glowing-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #4f46e5, #ec4899, #06b6d4, #4f46e5);
            background-size: 300% 300%;
            border-radius: inherit;
            z-index: -1;
            animation: moveGradient 4s linear infinite;
            filter: blur(8px);
            opacity: 0.5;
        }

        @keyframes moveGradient { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    </style>
</head>
<body class="text-white min-h-[100dvh] flex flex-col items-center justify-center overflow-hidden relative selection:bg-pink-500 selection:text-white">

    <div class="absolute inset-0 code-pattern opacity-20 pointer-events-none"></div>
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/30 rounded-full blur-[150px] animate-blob pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-pink-600/20 rounded-full blur-[150px] animate-blob pointer-events-none" style="animation-delay: 2s;"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[300px] bg-cyan-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-2xl px-6">
        
        <div class="glass-card p-10 md:p-14 rounded-[2rem] text-center relative overflow-hidden group">
            
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-gradient-to-r from-transparent via-indigo-500 to-transparent opacity-50"></div>

            <div class="relative w-28 h-28 mx-auto mb-8 flex items-center justify-center">
                <div class="absolute inset-0 border-2 border-dashed border-indigo-500/30 rounded-full animate-spin-slow"></div>
                <div class="absolute inset-2 border-2 border-pink-500/20 rounded-full animate-[spin_10s_linear_infinite_reverse]"></div>
                
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-pink-500 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/25 transform group-hover:scale-110 transition-transform duration-500">
                    <i class="fa-solid fa-code text-2xl text-white"></i>
                </div>
                
                <div class="absolute -bottom-2 -right-2 bg-zinc-900 border border-zinc-700 w-10 h-10 rounded-xl flex items-center justify-center shadow-xl">
                    <i class="fa-solid fa-hammer text-amber-400 text-sm animate-bounce"></i>
                </div>
            </div>

            <h1 class="text-4xl md:text-5xl font-black mb-4 tracking-tight leading-tight">
                Construim viitorul <br/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">Viralio Studio</span>
            </h1>
            
            <p class="text-zinc-400 text-base md:text-lg leading-relaxed mb-10 max-w-lg mx-auto font-medium">
                Platforma noastră este în plin proces de dezvoltare. Antrenăm modelele AI și pregătim instrumente revoluționare pentru tine.
            </p>

            <div class="mb-10 text-left">
                <div class="flex justify-between text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2 px-1">
                    <span>Faza de Dezvoltare</span>
                    <span class="text-indigo-400">85%</span>
                </div>
                <div class="h-2 w-full bg-zinc-900 rounded-full overflow-hidden border border-white/5">
                    <div class="h-full bg-gradient-to-r from-indigo-500 to-pink-500 w-[85%] relative">
                        <div class="absolute inset-0 bg-white/20 w-full animate-[moveGradient_2s_linear_infinite]" style="background-image: linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);"></div>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900/50 p-2 rounded-2xl border border-white/10 flex flex-col sm:flex-row gap-2 max-w-md mx-auto glowing-border">
                <input type="email" placeholder="Adresa ta de email..." class="flex-1 bg-transparent border-none outline-none text-white px-4 py-3 text-sm placeholder-zinc-500">
                <button class="bg-white text-black font-bold text-sm px-6 py-3 rounded-xl hover:bg-zinc-200 transition-colors whitespace-nowrap">
                    Anunță-mă
                </button>
            </div>

        </div>
        
        <div class="mt-8 flex justify-center gap-6">
            <a href="https://discord.gg/h8Ah6VKDzm" class="text-zinc-500 hover:text-indigo-400 transition-colors text-xl"><i class="fa-brands fa-discord"></i></a>
            <a href="https://t.me/SmartCreator_official" class="text-zinc-500 hover:text-sky-400 transition-colors text-xl"><i class="fa-brands fa-telegram"></i></a>
            <a href="#" class="text-zinc-500 hover:text-pink-400 transition-colors text-xl"><i class="fa-brands fa-instagram"></i></a>
        </div>
        
        <p class="text-center text-zinc-600 text-xs mt-6 font-medium">
            &copy; 2026 Viralio. Toate drepturile rezervate.
        </p>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <title>Admin Dashboard | Viralio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8 font-sans text-slate-800">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-black mb-6">Dashboard Viralio AI</h1>

        <div class="bg-slate-900 text-white p-6 rounded-2xl shadow-lg mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Balanță Cont GenAIPro</h3>
                <p class="text-3xl font-black mt-1">$<span id="api-balance">0.00</span></p>
            </div>
            <div class="h-px w-full md:w-px md:h-12 bg-slate-700"></div>
            <div>
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Cota Video (Veo) Folosită</h3>
                <p class="text-3xl font-black mt-1 text-pink-400"><span id="api-veo-used">0</span> <span class="text-lg text-slate-500 font-medium">/ <span id="api-veo-total">0</span></span></p>
            </div>
            <div class="h-px w-full md:w-px md:h-12 bg-slate-700"></div>
            <div class="text-right">
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Video Disponibil</h3>
                <p class="text-3xl font-black mt-1 text-emerald-400"><span id="api-veo-avail">0</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-slate-400 text-sm font-bold uppercase">Utilizatori (App)</h3>
                <p id="stat-users" class="text-4xl font-black text-indigo-600 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-slate-400 text-sm font-bold uppercase">Imagini (App)</h3>
                <p id="stat-images" class="text-4xl font-black text-pink-500 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-slate-400 text-sm font-bold uppercase">Video (App)</h3>
                <p id="stat-videos" class="text-4xl font-black text-emerald-500 mt-2">0</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-100 border-b border-slate-200 font-bold">Ultimele 100 de generări din aplicație</div>
            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="text-slate-400 bg-slate-50 uppercase text-xs">
                        <th class="p-4">Utilizator</th>
                        <th class="p-4">Tip</th>
                        <th class="p-4">Cantitate</th>
                        <th class="p-4">Credite</th>
                        <th class="p-4">Data și Ora</th>
                    </tr>
                </thead>
                <tbody id="logs-table" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        function getToken() {
            const m = document.cookie.match(/(?:^|; )viralio_token=([^;]*)/);
            return m ? m[1] : null;
        }

        async function loadDashboard() {
            const token = getToken();
            if (!token) {
                document.body.innerHTML = "<div class='p-10 text-center'><h1 class='text-3xl text-red-500 font-black mb-4'>Nu ești logat!</h1><p>Te rog să intri pe site-ul principal, să te loghezi, apoi să dai refresh aici.</p></div>";
                return;
            }

            try {
                // 1. Luăm datele interne (useri, loguri)
                const resStats = await fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } });
                if (!resStats.ok) throw new Error("Nu ești recunoscut ca Admin.");
                const dataStats = await resStats.json();
                
                document.getElementById('stat-users').innerText = dataStats.totalUsers;
                document.getElementById('stat-images').innerText = dataStats.totalImages;
                document.getElementById('stat-videos').innerText = dataStats.totalVideos;

                const tbody = document.getElementById('logs-table');
                tbody.innerHTML = '';
                dataStats.recentLogs.forEach(log => {
                    const row = document.createElement('tr');
                    const date = new Date(log.createdAt).toLocaleString('ro-RO');
                    row.innerHTML = `
                        <td class="p-4 font-medium">${log.userEmail}</td>
                        <td class="p-4"><span class="px-2 py-1 rounded bg-slate-100 text-xs font-bold uppercase ${log.type === 'video' ? 'text-emerald-600' : 'text-pink-600'}">${log.type}</span></td>
                        <td class="p-4 font-bold">${log.count}</td>
                        <td class="p-4 text-amber-600 font-bold">-${log.cost}</td>
                        <td class="p-4 text-slate-500">${date}</td>
                    `;
                    tbody.appendChild(row);
                });

                // 2. Luăm cota de la GenAIPro
                const resQuota = await fetch('/api/admin/api-quota', { headers: { 'Authorization': 'Bearer ' + token } });
                if (resQuota.ok) {
                    const dataQuota = await resQuota.json();
                    document.getElementById('api-balance').innerText = (dataQuota.balance / 10000).toFixed(2); // Presupunem că vine în fracții
                    document.getElementById('api-veo-used').innerText = dataQuota.veoUsed || 0;
                    document.getElementById('api-veo-total').innerText = dataQuota.veoTotal || 0;
                    document.getElementById('api-veo-avail').innerText = dataQuota.veoAvail || 0;
                }

            } catch (err) {
                console.error('Eroare:', err);
                if(err.message === "Nu ești recunoscut ca Admin.") {
                    document.body.innerHTML = `<div class='p-10 text-center'><h1 class='text-3xl text-red-500 font-black mb-4'>Acces Respins ⛔</h1><p>Doar administratorul are acces la acest panou.</p></div>`;
                }
            }
        }
        
        loadDashboard();
        setInterval(loadDashboard, 30000); // Refresh la 30 sec
    </script>
</body>
</html>
